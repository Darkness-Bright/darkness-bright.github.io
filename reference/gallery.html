<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Gallery</title>
  <style>
    /* General styles */
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      color: #fff;
      background-color: #222;
    }

    /* Header styles */
    header {
      height: 100px;
      background-color: #333;
      padding: 0 20px;
    }

    header h1 {
      margin: 0;
      line-height: 100px;
      font-size: 24px;
    }

    /* Gallery styles */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
    }

    .gallery img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      margin: 10px;
      border: 1px solid #333;
      cursor: pointer;
      transition: transform 0.3s ease-in-out;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }

    /* Modal styles */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      border: 1px solid #333;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header>
    <h1>Art Gallery</h1>
  </header>

  <!-- Gallery -->
  <div class="gallery">
    <img src="https://picsum.photos/200/200" alt="Image 1">
    <img src="https://picsum.photos/200/200" alt="Image 2">
    <img src="https://picsum.photos/200/200" alt="Image 3">
    <img src="https://picsum.photos/200/200" alt="Image 4">
    <img src="https://picsum.photos/200/200" alt="Image 5">
    <img src="https://picsum.photos/200/200" alt="Image 6">
    <img src="https://picsum.photos/200/200" alt="Image 7">
    <img src="https://picsum.photos/200/200" alt="Image 8">
    <img src="https://picsum.photos/200/200" alt="Image 9">
    <img src="https://picsum.photos/200/200" alt="Image 10">
  </div>

  <!-- Modal -->
  <div class="modal">
    <img src="#" alt="">
    <div class="modal-close">&times;</div>
  </div>

  <script>
    // Get the modal and images
    const modal = document.querySelector(".modal");
    const images = document.querySelectorAll(".gallery img");

    // Loop through all the images and add a click event listener
    images.forEach(img => img.addEventListener("click", () => {
      // Set the src and alt attributes of the modal image
      modal.querySelector("img").setAttribute("src", img.getAttribute("src"));
      modal.querySelector("img").setAttribute("alt", img.getAttribute("alt"));

      // Show the modal
      modal.style.display = "flex";
    }));

    // Add a click event listener to the modal close button
    modal.querySelector(".modal-close").addEventListener("click", () => {
      // Hide the modal
      modal.style.display = "none";
    });

    // Add a click event listener to the modal to close it when clicking outside of it
    modal.addEventListener("click", event => {
      if (event.target === modal) {
        modal.style.display = "none";
      }
    });

    // Add a keydown event listener to the document to close the modal when pressing the escape key
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        modal.style.display = "none";
      }
    });

  </script>
</body>

</html>
