<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Image from Unsplash</title>

  <!-- Add the styles for the page -->
  <style>
    /* General styles */
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      color: #333;
      background-color: #f0f0f0;
    }

    /* Image container styles */
    .image-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
    }

    /* Image styles */
    img {
      max-width: 100%;
      max-height: 100%;
    }

    /* Button styles */
    .button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      background-color: #4caf50;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <!-- Image container -->
  <div class="image-container">
    <img src="" alt="Random image from Unsplash" id="image">
  </div>

  <!-- Button to fetch a random image -->
  <button class="button" type="button" id="button">Fetch Random Image</button>

  <!-- Add the JavaScript for the page -->
  <script>
    // Get the button and image elements
    const button = document.getElementById("button");
    const image = document.getElementById("image");

    // Add an event listener to the button
    button.addEventListener("click", () => {
      // Fetch a random image from Unsplash
      fetch("https://source.unsplash.com/random")
        .then(response => {
          // Update the image src with the image URL
          image.src = response.url;
        });
    });
  </script>
</body>
</html>
